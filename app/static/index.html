<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ebook-convert</title>
    <style>
      :root {
        --bg: #0e1014;
        --panel: #161922;
        --panel-2: #1c202b;
        --border: #272c38;
        --border-soft: #20242f;
        --text: #eceef4;
        --muted: #9aa3b4;
        --faint: #6b7384;
        --accent: #6492ff;
        --accent-2: #4a78ec;
        --danger: #ff7a7a;
        --ok: #56d98a;
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font:
          14px/1.6 system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: radial-gradient(
          1200px 600px at 50% -200px,
          #1a1f2b 0%,
          var(--bg) 60%
        );
        color: var(--text);
        -webkit-text-size-adjust: 100%;
        padding-bottom: calc(96px + env(safe-area-inset-bottom));
      }

      header {
        max-width: 880px;
        margin: 0 auto;
        padding: 40px 24px 24px;
        text-align: center;
      }

      header h1 {
        font-size: 26px;
        margin: 0 0 6px;
        letter-spacing: -0.02em;
      }

      header p {
        margin: 0;
        color: var(--muted);
      }

      header a {
        color: var(--accent);
        text-decoration: none;
      }

      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 0 24px;
        padding-bottom: 100px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        margin-bottom: 28px;
      }

      .card h2 {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--faint);
        margin: 0 0 18px;
        font-weight: 600;
      }

      .setup-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
      }

      @media (min-width: 620px) {
        .setup-grid {
          grid-template-columns: 1fr auto 1fr;
          align-items: end;
        }

        .arrow {
          padding-bottom: 12px;
          color: var(--faint);
          font-size: 20px;
        }
      }

      .arrow {
        display: none;
        text-align: center;
      }

      @media (min-width: 620px) {
        .arrow {
          display: block;
        }
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      .field > label {
        font-weight: 600;
        font-size: 13px;
      }

      .field .help {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      input,
      select {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 12px;
        font: inherit;
        width: 100%;
        transition:
          border-color 0.12s,
          box-shadow 0.12s;
      }

      input[type="file"] {
        padding: 9px 12px;
        cursor: pointer;
      }

      input::file-selector-button {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 6px 12px;
        margin-right: 12px;
        cursor: pointer;
        font: inherit;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(100, 146, 255, 0.18);
      }

      .options-head {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .options-head h2 {
        margin: 0;
      }

      .options-head .grow {
        flex: 1;
      }

      .filter {
        max-width: 240px;
      }

      .linkbtn {
        background: none;
        border: none;
        color: var(--accent);
        cursor: pointer;
        font: inherit;
        padding: 4px 6px;
      }

      .linkbtn:hover {
        text-decoration: underline;
      }

      details.group {
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        margin-bottom: 14px;
        background: var(--panel-2);
        overflow: hidden;
      }

      details.group > summary {
        cursor: pointer;
        padding: 16px 18px;
        font-weight: 600;
        user-select: none;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      details.group > summary::-webkit-details-marker {
        display: none;
      }

      details.group > summary::before {
        content: "›";
        color: var(--faint);
        font-size: 18px;
        transition: transform 0.15s;
        display: inline-block;
      }

      details.group[open] > summary::before {
        transform: rotate(90deg);
      }

      details.group > summary .count {
        margin-left: auto;
        color: var(--faint);
        font-weight: 500;
        font-size: 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 2px 10px;
      }

      .group-body {
        padding: 6px 18px 20px;
        border-top: 1px solid var(--border-soft);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 22px 28px;
        padding-top: 18px;
      }

      @media (min-width: 640px) {
        .grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      .field.hidden,
      details.group.hidden {
        display: none;
      }

      .actionbar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(14, 16, 20, 0.85);
        backdrop-filter: blur(10px);
        border-top: 1px solid var(--border);
      }

      .actionbar .inner {
        max-width: 880px;
        margin: 0 auto;
        padding: 16px 24px;
        padding-bottom: calc(16px + env(safe-area-inset-bottom));
        display: flex;
        align-items: center;
        gap: 16px;
      }

      #status {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      button.primary {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px 26px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.12s;
      }

      button.primary:hover {
        background: var(--accent-2);
      }

      button.primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #status {
        font-size: 13px;
        color: var(--muted);
      }

      #status.err {
        color: var(--danger);
      }

      #status.ok {
        color: var(--ok);
      }

      .muted {
        color: var(--muted);
      }

      .empty {
        color: var(--faint);
        padding: 8px 2px;
      }

      .spinner {
        width: 15px;
        height: 15px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        display: inline-block;
        animation: spin 0.8s linear infinite;
        vertical-align: -3px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 560px) {
        header {
          padding: 28px 16px 16px;
        }
        header h1 {
          font-size: 22px;
        }
        main {
          padding: 0 14px;
        }
        .card {
          padding: 18px 16px;
          border-radius: 12px;
          margin-bottom: 20px;
        }
        .options-head {
          gap: 8px;
        }
        .options-head .grow {
          display: none;
        }
        .filter {
          order: 3;
          flex: 1 1 100%;
          max-width: none;
        }
        .grid {
          gap: 18px;
          padding-top: 14px;
        }
        details.group > summary,
        .group-body {
          padding-left: 14px;
          padding-right: 14px;
        }
        .actionbar .inner {
          padding: 12px 14px;
          padding-bottom: calc(12px + env(safe-area-inset-bottom));
          gap: 12px;
        }
        button.primary {
          padding: 13px 20px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>ebook-convert</h1>
      <p>Convert ebooks via Calibre · <a href="/docs">API docs</a></p>
    </header>

    <main>
      <form id="form">
        <div class="card">
          <h2>Conversion</h2>
          <div class="setup-grid">
            <div class="field">
              <label for="file">Source file</label>
              <input type="file" id="file" name="file" required />
              <span class="help"
                >Input format is detected from the file extension.</span
              >
            </div>
            <div class="arrow">→</div>
            <div class="field">
              <label for="output_format">Output format</label>
              <select id="output_format" name="output_format" required></select>
              <span class="help">Target format for the converted file.</span>
            </div>
          </div>
          <input type="hidden" id="input_format" />
        </div>

        <div class="card" id="options-card">
          <div class="options-head">
            <h2>Options</h2>
            <span class="grow"></span>
            <input
              class="filter"
              id="filter"
              type="search"
              placeholder="Filter options…"
            />
            <button type="button" class="linkbtn" id="expand-all">
              Expand all
            </button>
            <button type="button" class="linkbtn" id="collapse-all">
              Collapse all
            </button>
          </div>
          <div id="options">
            <p class="empty">
              Choose a source file and output format to see available options.
            </p>
          </div>
        </div>
      </form>
    </main>

    <div class="actionbar">
      <div class="inner">
        <button type="submit" form="form" class="primary" id="submit">
          Convert &amp; download
        </button>
        <span id="status"></span>
      </div>
    </div>

    <script>
      const $ = (s) => document.querySelector(s);
      const outputSel = $("#output_format");
      const inputHidden = $("#input_format");
      const fileInput = $("#file");
      const optionsBox = $("#options");
      const filterInput = $("#filter");
      const statusEl = $("#status");
      const submitBtn = $("#submit");

      let inputFormats = [];

      function setStatus(msg, kind) {
        statusEl.className = kind || "";
        statusEl.innerHTML = msg;
      }

      function fillSelect(sel, items, placeholder) {
        sel.innerHTML = "";
        if (placeholder) {
          const o = document.createElement("option");
          o.value = "";
          o.textContent = placeholder;
          sel.appendChild(o);
        }
        for (const item of items) {
          const o = document.createElement("option");
          o.value = item;
          o.textContent = item.toUpperCase();
          sel.appendChild(o);
        }
      }

      async function loadFormats() {
        const res = await fetch("/formats");
        if (!res.ok) throw new Error("Failed to load formats");
        const data = await res.json();
        inputFormats = data.input_formats;
        fillSelect(outputSel, data.output_formats, "Select…");
      }

      function detectInput() {
        const name = fileInput.files?.[0]?.name || "";
        const ext = name.split(".").pop()?.toLowerCase();
        inputHidden.value = ext && inputFormats.includes(ext) ? ext : "";
        renderOptions();
      }

      function fieldFor(opt) {
        const wrap = document.createElement("div");
        wrap.className = "field";
        wrap.dataset.search = (opt.name + " " + (opt.help || "")).toLowerCase();

        const label = document.createElement("label");
        label.textContent = opt.name;
        label.htmlFor = "opt-" + opt.name;
        wrap.appendChild(label);

        let control;
        const defText =
          opt.default === null || opt.default === ""
            ? null
            : String(opt.default);

        if (opt.type === "bool") {
          control = document.createElement("select");
          for (const [v, t] of [
            ["", "— default"],
            ["true", "true"],
            ["false", "false"],
          ]) {
            const o = document.createElement("option");
            o.value = v;
            o.textContent = t;
            control.appendChild(o);
          }
        } else if (opt.type === "choice" && opt.choices) {
          control = document.createElement("select");
          const e = document.createElement("option");
          e.value = "";
          e.textContent = "— default";
          control.appendChild(e);
          for (const c of opt.choices) {
            const o = document.createElement("option");
            o.value = c;
            o.textContent = c;
            control.appendChild(o);
          }
        } else {
          control = document.createElement("input");
          control.type =
            opt.type === "int" || opt.type === "float" ? "number" : "text";
          if (opt.type === "float") control.step = "any";
          if (defText !== null) control.placeholder = "default: " + defText;
        }

        control.id = "opt-" + opt.name;
        control.name = opt.name;
        control.dataset.optName = opt.name;
        wrap.appendChild(control);

        if (opt.help) {
          const help = document.createElement("span");
          help.className = "help";
          help.textContent = opt.help;
          wrap.appendChild(help);
        }
        return wrap;
      }

      async function renderOptions() {
        const inFmt = inputHidden.value;
        const outFmt = outputSel.value;
        if (!inFmt || !outFmt) {
          optionsBox.innerHTML =
            '<p class="empty">Choose a source file and output format to see available options.</p>';
          return;
        }
        optionsBox.innerHTML =
          '<p class="empty"><span class="spinner"></span> Loading options…</p>';
        let groups;
        try {
          const res = await fetch(`/formats/${inFmt}/${outFmt}/options`);
          if (!res.ok)
            throw new Error(
              (await res.json()).detail || "Failed to load options",
            );
          groups = await res.json();
        } catch (e) {
          optionsBox.innerHTML = `<p class="empty">${e.message}</p>`;
          return;
        }

        optionsBox.innerHTML = "";
        for (const group of groups) {
          const details = document.createElement("details");
          details.className = "group";

          const summary = document.createElement("summary");
          summary.innerHTML = `${group.group} <span class="count">${group.options.length}</span>`;
          details.appendChild(summary);

          const body = document.createElement("div");
          body.className = "group-body";
          const grid = document.createElement("div");
          grid.className = "grid";
          for (const opt of group.options) grid.appendChild(fieldFor(opt));
          body.appendChild(grid);
          details.appendChild(body);
          optionsBox.appendChild(details);
        }
        applyFilter();
      }

      function applyFilter() {
        const q = filterInput.value.trim().toLowerCase();
        for (const group of optionsBox.querySelectorAll("details.group")) {
          let visible = 0;
          for (const field of group.querySelectorAll(".field")) {
            const match = !q || field.dataset.search.includes(q);
            field.classList.toggle("hidden", !match);
            if (match) visible++;
          }
          group.classList.toggle("hidden", visible === 0);
          if (q && visible > 0) group.open = true;
        }
      }

      function setAllOpen(open) {
        for (const g of optionsBox.querySelectorAll(
          "details.group:not(.hidden)",
        ))
          g.open = open;
      }

      function collect(formData) {
        for (const c of optionsBox.querySelectorAll("[data-opt-name]")) {
          if (c.value !== "" && c.value != null)
            formData.append(c.dataset.optName, c.value);
        }
      }

      async function onSubmit(e) {
        e.preventDefault();
        if (!fileInput.files?.length)
          return setStatus("Select a source file first.", "err");
        if (!inputHidden.value)
          return setStatus("Unsupported input file extension.", "err");
        if (!outputSel.value)
          return setStatus("Select an output format.", "err");

        const fd = new FormData();
        fd.append("file", fileInput.files[0]);
        fd.append("output_format", outputSel.value);
        collect(fd);

        submitBtn.disabled = true;
        setStatus('<span class="spinner"></span> Converting…');
        try {
          const res = await fetch("/convert", { method: "POST", body: fd });
          if (!res.ok) {
            let detail = res.statusText;
            try {
              detail = (await res.json()).detail || detail;
            } catch {}
            throw new Error(detail);
          }
          const blob = await res.blob();
          const dispo = res.headers.get("Content-Disposition") || "";
          const m = dispo.match(/filename\*?=(?:UTF-8'')?"?([^\";]+)"?/i);
          const name = m
            ? decodeURIComponent(m[1])
            : `output.${outputSel.value}`;
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = name;
          a.click();
          URL.revokeObjectURL(url);
          setStatus("Downloaded " + name, "ok");
        } catch (err) {
          setStatus("Error: " + err.message, "err");
        } finally {
          submitBtn.disabled = false;
        }
      }

      fileInput.addEventListener("change", detectInput);
      outputSel.addEventListener("change", renderOptions);
      filterInput.addEventListener("input", applyFilter);
      $("#expand-all").addEventListener("click", () => setAllOpen(true));
      $("#collapse-all").addEventListener("click", () => setAllOpen(false));
      $("#form").addEventListener("submit", onSubmit);

      loadFormats().catch((e) => setStatus("Error: " + e.message, "err"));
    </script>
  </body>
</html>
