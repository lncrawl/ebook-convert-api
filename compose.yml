services:
  api:
    build:
      context: .
      target: app
    image: ebook-convert-api
    container_name: ebook-convert
    ports:
      - "8000:8000"
    environment:
      MAX_CONCURRENT_JOBS: "4"
      CONVERSION_TIMEOUT_SECONDS: "300"
      MAX_UPLOAD_MB: "100"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 3g
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/ready').status==200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
