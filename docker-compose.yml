services:
  api:
    build:
      context: .
      args:
        CALIBRE_VERSION: "9.9.0"
    image: ebook-convert-api:dev
    ports:
      - "8000:8000"
    environment:
      MAX_CONCURRENT_JOBS: ""        # empty = auto-size from cgroup limits
      MEMORY_PER_JOB_MB: "256"
      CONVERSION_TIMEOUT_SECONDS: "300"
      MAX_UPLOAD_MB: "100"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
