name: Lint

on:
  workflow_dispatch: {}
  workflow_call: {}
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Install uv & Python 3.14
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: 📦 Install dependencies
        run: uv sync --frozen

      - name: 🧹 Static checks (ruff + pyright)
        run: uv run poe check
