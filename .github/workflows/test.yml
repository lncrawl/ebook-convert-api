name: Integration Test

on:
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Integration tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🏗️ Build & start the service
        run: docker compose up -d --build

      - name: ⏳ Wait for readiness
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/ready >/dev/null 2>&1; then
              echo "service is ready"; exit 0
            fi
            sleep 5
          done
          echo "::error::service did not become ready in time"
          docker compose logs
          exit 1

      - name: 🐍 Install uv & Python 3.14
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: 📦 Install dependencies
        run: uv sync --frozen

      - name: 🧪 Run unit tests
        env:
          API_BASE_URL: http://localhost:8000
        run: uv run poe test-unit

      - name: 🧪 Run integration tests
        env:
          API_BASE_URL: http://localhost:8000
        run: uv run poe test-int

      - name: 🧾 Dump service logs on failure
        if: failure()
        run: docker compose logs
