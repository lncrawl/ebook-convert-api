services:
  api:
    build:
      context: .
      target: dev
    image: ebook-convert-api:dev
    container_name: ebook-convert-dev
    ports:
      - "8000:8000"
    environment:
      MAX_CONCURRENT_JOBS: "4"
      CONVERSION_TIMEOUT_SECONDS: "300"
      MAX_UPLOAD_MB: "100"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./scripts:/app/scripts
